server {
    listen 80;
    server_name api.bloxtcgshop.com;

    # Allow larger payloads (e.g., for uploading pokemon card images/banners)
    client_max_body_size 50M;

    # Gzip settings for JSON API payloads
    gzip on;
    gzip_proxied any;
    gzip_types application/json;
    gzip_vary on;

    location / {
        proxy_pass http://127.0.0.1:3041;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Broaden timeouts for heavy operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
